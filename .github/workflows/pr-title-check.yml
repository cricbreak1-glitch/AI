name: "PR Title Enforcement"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  validate-title:
    name: "Check PR Title Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Title Validation Script
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          chmod +x .github/scripts/validate-title.sh
          .github/scripts/validate-title.sh
